# ──────────────────────────────────────────────────────────────────────────────
# Default (QA) Configuration
# Override any property via -Dproperty=value on the Maven CLI
# ──────────────────────────────────────────────────────────────────────────────

# Application
base.url=https://crm-qa.example.com
env=qa

# Browser
browser=chrome
headless=false

# Credentials — override in CI via Jenkins credentials binding or -D system properties.
# Never commit real passwords to source control.
admin.username=admin@crm.com
admin.password=Admin@123
sales.username=sales@crm.com
sales.password=Sales@123
manager.username=manager@crm.com
manager.password=Mgr@123

# Timeouts (seconds)
explicit.wait=15
page.load.timeout=30
implicit.wait=10

# Reports
report.dir=target/extent-reports
screenshot.dir=target/screenshots
